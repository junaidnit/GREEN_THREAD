<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font: 13px/1.4 -apple-system, Segoe UI, sans-serif; width: 240px; margin: 0; padding: 14px; background: #F5F3EF; color: #3A3A55; }
  h1 { font-size: 14px; margin: 0 0 4px; }
  p { margin: 0 0 10px; color: #6F6F66; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: #6F6F66; margin-bottom: 4px; }
  input { width: 100%; box-sizing: border-box; padding: 7px 8px; border: 1px solid #E2DED7; border-radius: 6px; font-size: 12px; }
  button { margin-top: 8px; width: 100%; padding: 7px; border: none; border-radius: 6px; background: #4B2144; color: #F5F3EF; font-size: 12px; font-weight: 600; cursor: pointer; }
  button:active { opacity: .85; }
  #status { margin-top: 8px; font-size: 11px; color: #4B2144; min-height: 14px; }
</style>
</head>
<body>
  <h1>The Fibre Set</h1>
  <p>Click the ribbon on any product page to check its fabric.</p>
  <label for="base">API endpoint</label>
  <input id="base" placeholder="https://thefibreset.com" />
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
